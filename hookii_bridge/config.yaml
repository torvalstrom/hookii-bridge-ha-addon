name: Hookii Bridge
version: "1.1.6"
slug: hookii_bridge
description: >-
  REQUIRES Hookii BETA firmware 1.6.8.4-beta or newer. Reverse-engineered
  cloud bridge for Hookii Neomow robot mowers (May 2026 BETA protocol).
  Logs in, keeps the JWT heartbeat alive, normalises the payload, REST
  command channel for start/pause/return/stop, publishes Home Assistant
  MQTT Discovery configs so a lawn_mower entity + 5 buttons + telemetry
  sensors appear in HA without any YAML.
url: https://github.com/torvalstrom/hookii-bridge-ha-addon
arch:
  - amd64
  - aarch64
  - armv7
init: false
boot: auto
startup: services
host_network: false
hassio_api: false
homeassistant_api: false
options:
  hookii_email: ""
  hookii_password: ""
  mower_serials: ""
  local_mqtt_host: "core-mosquitto"
  local_mqtt_port: 1883
  local_mqtt_user: ""
  local_mqtt_pass: ""
  heartbeat_seconds: 15
  log_level: "INFO"
  hookii_agent: "Android/Xiaomi 25010PN30G 16/V1.1.0/189"
  enable_discovery: true
  discovery_prefix: "homeassistant"
schema:
  hookii_email: str
  hookii_password: password
  mower_serials: str
  local_mqtt_host: str
  local_mqtt_port: port
  local_mqtt_user: str
  local_mqtt_pass: password
  heartbeat_seconds: int(5,120)
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  hookii_agent: str
  enable_discovery: bool
  discovery_prefix: str
