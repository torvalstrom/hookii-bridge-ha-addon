name: Hookii Bridge
version: "1.5.0-beta3"
slug: hookii_bridge
# Prebuilt multi-arch image published to GHCR by CI (.github/workflows/build.yaml).
# With this key the Supervisor PULLS the image instead of building it locally on
# the user's device, so updates are fast and don't fail on slow/ARM hardware.
image: "ghcr.io/torvalstrom/{arch}-hookii-bridge"
description: >-
  Reverse-engineered cloud bridge for Hookii Neomow robot mowers. Works with
  the BETA cloud (iot.beta.hookii.com, the protocol's reference backend) or the
  PRODUCTION cloud (iot.hookii.com) via the hookii_env option. Logs in, keeps
  the JWT heartbeat alive, normalises the payload, REST command channel for
  start/pause/return/stop, publishes Home Assistant MQTT Discovery configs so a
  lawn_mower entity + buttons + telemetry sensors appear in HA without any YAML.
  Richest telemetry (robotStatus, firmware-upgrade state) needs BETA firmware
  1.6.8.4-beta+; stable/prod firmware emits a sparser status that the bridge
  still maps gracefully.
url: https://github.com/torvalstrom/hookii-bridge-ha-addon
arch:
  - amd64
  - aarch64
  - armv7
init: false
boot: auto
startup: services
host_network: false
hassio_api: false
homeassistant_api: false
# The live Mower Map (formerly a separate add-on) is now built in and served
# over Home Assistant Ingress - it appears as a "Mower Map" panel in the
# sidebar with no extra install. It reuses this add-on's MQTT settings and the
# mower serials below, so there is nothing extra to configure.
ingress: true
ingress_port: 8000
panel_icon: mdi:map-outline
panel_title: Mower Map
# Direct host:port to the map is OFF by default (ingress is enough). Set a host
# port only if you need to embed the map outside Home Assistant.
ports:
  8000/tcp: null
ports_description:
  8000/tcp: Direct web access to the Mower Map (optional - leave unset for ingress-only)
options:
  hookii_email: ""
  hookii_password: ""
  mower_serials: ""
  local_mqtt_host: "core-mosquitto"
  local_mqtt_port: 1883
  local_mqtt_user: ""
  local_mqtt_pass: ""
  heartbeat_seconds: 15
  log_level: "INFO"
  hookii_agent: "Android/Xiaomi 25010PN30G 16/V1.1.0/189"
  enable_discovery: true
  discovery_prefix: "homeassistant"
  hookii_env: "beta"
  hookii_rest_host: ""
  hookii_mqtt_host: ""
  hookii_mqtt_user: ""
  hookii_mqtt_pass: ""
  map_trail_max: 2000
  map_rotate_deg: 0
schema:
  hookii_email: str
  hookii_password: password
  mower_serials: str
  local_mqtt_host: str
  local_mqtt_port: port
  local_mqtt_user: str
  local_mqtt_pass: password
  heartbeat_seconds: int(5,120)
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  hookii_agent: str
  enable_discovery: bool
  discovery_prefix: str
  # Server environment: beta (iot.beta.hookii.com) or prod (iot.hookii.com).
  hookii_env: list(beta|prod)
  # Optional explicit overrides (host:port). Leave blank to use the env preset.
  hookii_rest_host: "str?"
  hookii_mqtt_host: "str?"
  # Cloud MQTT broker credentials. The bridge defaults to the BETA broker's
  # shared static pair (hookii-iot / ...). The PROD broker (iot.hookii.com) uses
  # a DIFFERENT shared static pair - set both here when running hookii_env: prod.
  hookii_mqtt_user: "str?"
  hookii_mqtt_pass: "password?"
  # Built-in Mower Map display options.
  map_trail_max: int(100,10000)
  map_rotate_deg: int(-360,360)
