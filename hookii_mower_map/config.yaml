name: Hookii Mower Map
version: "1.1.0"
slug: hookii_mower_map
# Prebuilt multi-arch image published to GHCR by CI (.github/workflows/build.yaml).
# With this key the Supervisor PULLS the image instead of building it locally on
# the user's device, so updates are fast and don't fail on slow/ARM hardware.
image: "ghcr.io/torvalstrom/{arch}-hookii-mower-map"
description: >-
  Live SVG yard visualizer for Hookii Neomow robot mowers. Subscribes to the
  same local Mosquitto/EMQX broker the Hookii Bridge add-on publishes to,
  captures the cloud's STATUS / DEVICE_MAP_V2 / ALL_PATH_LIST_V2 messages,
  and renders a per-mower SVG with boundary, cut/transit paths, live trail
  and current position. Drop the iframe URL into a Lovelace iframe card.
url: https://github.com/torvalstrom/hookii-bridge-ha-addon
arch:
  - amd64
  - aarch64
  - armv7
init: false
boot: auto
startup: services
host_network: false
hassio_api: false
homeassistant_api: false
ingress: true
ingress_port: 8000
panel_icon: mdi:map-outline
panel_title: Mower Map
# Host port mapping is INTENTIONALLY null by default so the add-on doesn't
# fight Portainer / any other service that runs on host port 8000. Access via
# HA's built-in ingress (panel + iframe URL `/hassio/ingress/hookii_mower_map/`)
# works without the host port being mapped. If you specifically need direct
# host:port access (e.g. for an external iframe outside HA), set
# "Host network port" to 8000 or any free host port in the add-on Configuration
# tab - the internal container port stays 8000.
ports:
  8000/tcp: null
ports_description:
  8000/tcp: HTTP (SVG + JSON API + iframe pages) - leave unset for ingress-only access
options:
  mowers: ""
  local_mqtt_host: "core-mosquitto"
  local_mqtt_port: 1883
  local_mqtt_user: ""
  local_mqtt_pass: ""
  topic_prefix: "hookii/details/device"
  trail_max: 2000
  log_level: "INFO"
  rotate_deg: 0
schema:
  mowers: str
  local_mqtt_host: str
  local_mqtt_port: port
  local_mqtt_user: str
  local_mqtt_pass: password
  topic_prefix: str
  trail_max: int(100,10000)
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  rotate_deg: int(-360,360)
